<!DOCTYPE html >
<html lang="en">
<head>
    <title>SignUp</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/sign.css">
</head>
<body>
<div class="H1">
    <h1>E-Learning Courses</h1>
</div>
<div class="container">
    <fieldset>
        <legend>Sign Up</legend>
        <form id="signupForm">

            <div class="form-group">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" placeholder="First Name" required>
            </div>

            <div class="form-group">
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" placeholder="Last Name" required>
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" placeholder="Your Age" min="10" max="100" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="yourname@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password"> Password:</label>
                <input type="password" id="password" name="password" placeholder="Min 6 characters" required>
            </div>

            <div class="form-group">
                <label for="role">I am a:</label>
                <select id="role" name="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                </select>
            </div>

            <div id="error-msg" style="color:red; text-align:center; display:none;"></div>

            <div class="form-buttons">
                <input type="submit" value="SignUp">
                <input type="reset" value="Reset">
            </div>

            <div class="Link">
                <br>
                Already have an account? <a href="login.html">Login</a>
            </div>

        </form>
    </fieldset>
</div>


<script src="js/auth.js"></script>
</body>
</html>
