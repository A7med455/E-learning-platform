<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/sign.css">
</head>
<body>
<div class="H1">
    <h1>E-Learning Courses</h1>
</div>
<div class="container">
    <fieldset>
        <legend>Login</legend>
        <!-- CHANGED: added action and method so form submits directly to PHP -->
        <form id="loginForm" action="php/login.php" method="POST">

            <div class="form-group">
                <label for="email">Email:</label>
                <!-- CHANGED: added name attribute so PHP can read it -->
                <input type="email" id="email" name="email" placeholder="yourname@gmail.com">
            </div>

            <div class="form-group">
                <label for="password"> Password:</label>
                <!-- CHANGED: added name attribute -->
                <input type="password" id="password" name="password" placeholder="Your Password" required>
            </div>

            <div id="error-msg" style="color:red; text-align:center; display:none;"></div>

            <div class="form-buttons">
                <input type="submit" value="Login">
                <input type="reset" value="Reset">
            </div>

            <div class="Link">
                <br>
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>

        </form>
    </fieldset>
</div>

<script src="js/auth.js"></script>

</body>
</html>
