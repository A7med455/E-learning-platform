<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wallet</title>
    <link rel="stylesheet" href="wallet.css">
</head>
<body>
<div class="wallet-container">
    <h2> My Wallet</h2>
    <div class="card">
        <h4 id="balance">Balance: 0 EGP</h4>
    </div>
    <div class="card">
        <h4>Top Up wallet</h4>
        <form id="walletForm">
            <label>Card number</label>
            <input type="text" name="card_number"  placeholder="Enter card number">

            <label> CVV</label>
            <input type="text" name="cvv" placeholder="Enter CVV">

            <label> Expiry date</label>
            <input type="month"  name="expiry"  placeholder="Enter expiry date">

            <label> Amount</label>
            <input type="number" name="amount" placeholder="Enter amount">
            <form method="POST" action="php/topup.php">
                <button> Add Money </button>
            </form>
        </form>
    </div>
</div>
<script src="wallet.js"></script>
</body>
</html>
