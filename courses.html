<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Courses – Coursify</title>
    <link rel="stylesheet" href="css/courses.css"/>
</head>
<body>
<nav class="navbar">
    <div class="container nav-container">
        <a class="logo" href="index.html">Coursify</a>
        <ul class="nav-links">
            <li><a class="active-link" href="courses.html">Courses</a></li>
            <li><a href="Login.html">Login</a></li>
            <li><a class="signup-btn" href="signup.html">Sign Up</a></li>
        </ul>
    </div>
</nav>
<section class="page-header">
    <div class="container">
        <h2>All Courses</h2>
    </div>
</section>
<section class="filters-section">
    <div class="container">

        <div class="filters-container">

            <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search courses..."
            />
            <!--temp categories-->
            <select id="categoryFilter" class="category-select">
                <option value="">All Categories</option>
                <option value="Programming">Programming</option>
                <option value="Design">Design</option>
                <option value="Business">Business</option>
                <option value="Marketing">Marketing</option>
                <option value="Data Science">Data Science</option>
                <option value="Other">Other</option>
            </select>

        </div>

    </div>
</section>
<section class="courses-section">
    <div class="container">

        <div id="coursesContainer" class="courses-grid">
        </div>
        <div id="noResults" class="no-results">
            <p>No courses found.</p>
        </div>
    </div>
</section>
<footer class="footer">
    <p>&copy; 2025 Coursify. All rights reserved.</p>
</footer>
<script src="js/courses.js"></script>
</body>
</html>
